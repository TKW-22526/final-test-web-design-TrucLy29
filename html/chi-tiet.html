const id = new URLSearchParams(window.location.search).get("id");
const p = products[id];

if (p) {
  const colorBtns = p.colors.map((c, i) =>
    `<button class="btn btn-outline-danger btn-sm color-btn" onclick="changeColor('${c.img}', this)">${c.name}</button>`
  ).join(" ");

  document.getElementById("productDetail").innerHTML = `
    <div class="row g-4">
      <div class="col-md-5 text-center">
        <img id="mainImg" src="${p.img}" class="img-fluid rounded shadow" alt="${p.name}">
      </div>
      <div class="col-md-7">
        <h2>${p.name}</h2>
        <h4 class="text-danger">${p.price}</h4>
        <p>${p.desc}</p>
        <table class="table table-bordered mt-3">
          <tr><th>Danh mục</th><td>Sản phẩm làm đẹp</td></tr>
          <tr><th>Loại sản phẩm</th><td>${p.type}</td></tr>
          <tr><th>Thương hiệu</th><td>3CE</td></tr>
          <tr><th>Giá bán</th><td>${p.price}</td></tr>
        </table>
        ${p.colors.length ? `<h6>Phân loại màu sắc</h6><div class="d-flex flex-wrap gap-2 mb-3">${colorBtns}</div>` : ""}
        <button class="btn btn-danger me-2" onclick="addToCart(p.name, p.price)">🛒 Thêm vào giỏ hàng</button>
        <a href="san-pham.html" class="btn btn-secondary">Quay lại</a>
      </div>
    </div>`;
} else {
  document.getElementById("notFound").style.display = "block";
}

function changeColor(src, btn) {
  document.getElementById("mainImg").src = src;
  document.querySelectorAll(".color-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

function addToCart(name, price) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push({ name, price });
  localStorage.setItem("cart", JSON.stringify(cart));
  document.getElementById("cartCount").innerText = cart.length;
  alert("Đã thêm " + name + " vào giỏ hàng!");
}

function renderCart() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let list = document.getElementById("cartList");
  if (!cart.length) { list.innerHTML = "<li style=\"color:#999\">Giỏ hàng trống</li>"; return; }
  list.innerHTML = cart.map((it, idx) =>
    `<li>${it.name} - <b>${it.price}</b><button class="del-btn" onclick="removeCart(${idx})">✕</button></li>`
  ).join("");
}
function removeCart(idx) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.splice(idx, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  document.getElementById("cartCount").innerText = cart.length;
  renderCart();
}
function buyNow() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  if (!cart.length) { alert("Giỏ hàng trống!"); return; }
  alert("Cảm ơn bạn đã mua hàng!\n" + cart.map(i => i.name + " - " + i.price).join("\n"));
  localStorage.removeItem("cart");
  document.getElementById("cartCount").innerText = 0;
  renderCart();
}
function openCart() {
  renderCart();
  document.getElementById("cartPanel").style.display = "block";
}
function closeCart() {
  document.getElementById("cartPanel").style.display = "none";
}

document.getElementById("cartCount").innerText = (JSON.parse(localStorage.getItem("cart")) || []).length;
</script>
